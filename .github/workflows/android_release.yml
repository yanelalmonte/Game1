name: "Build and Release APK"

on:
  push:
    branches:
      - master

jobs:
  export-android:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Godot Android Export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot/releases/download/4.6-stable/Godot_v4.6-stable_export_templates.tpz
          relative_project_path: "./" 
          archive_output: false
          export_preset_name: "Android" 
          build_directory: "build"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          # Al estar en el root, Godot lo encontrará directamente como release.jks
          ANDROID_KEYSTORE_PATH: "release.jks" 
          ANDROID_KEYSTORE_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Check Build Folder
        run: ls -R build/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v0.1.${{ github.run_number }}
          name: "Game1 Apk - Build ${{ github.run_number }}"
          # Corregido para que busque en todas las subcarpetas de build
          files: build/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
